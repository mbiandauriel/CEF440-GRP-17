name: car_fault_diagnosis_app
description: A car fault diagnosis mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  
  # Bluetooth OBD2
  flutter_blue_plus: ^1.32.0
  
  # Camera & ML Kit
  camera: ^0.10.5
  google_ml_kit: ^0.16.0
  image_picker: ^1.0.4
  
  # Utilities
  permission_handler: ^11.0.1
  path_provider: ^2.1.0
  path: ^1.9.0

  # Local database & API
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.3.0
  http: ^1.2.0
  flutter_dotenv: ^5.2.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.jpeg
    - database/dtc_codes.db
    - .env